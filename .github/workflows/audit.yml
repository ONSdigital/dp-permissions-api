name: Audit

permissions:
  contents: read

on:
  schedule:
    - cron: 0 0 */7 * *
  workflow_dispatch:

# Single source of truth for tool versions
env:
  JAVA_VERSION: '8'

jobs:
  dp-permissions-api-audit-java:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Setup Java
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven
      - name: Configure Maven settings.xml for OSS Index
        uses: s4u/maven-settings-action@894661b3ddae382f1ae8edbeab60987e08cf0788 # v4.0.0
        with:
          servers: |
            [{
              "id": "ossindex",
              "username": "${{ secrets.OSSINDEX_USERNAME }}",
              "password": "${{ secrets.OSSINDEX_TOKEN }}"
            }]
      - name: Run Java audit
        run: make audit-java
      - name: Slack notification on failure
        # Only notify failures for periodic runs on main branch
        if: failure() && env.BRANCH_NAME == 'master'
        uses: slackapi/slack-github-action@dcb1066f776dd043e64d0e8ba94ca15cc7e1875d # v4.0.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            text: "<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|audit test ${{ github.run_id }}> failed for <${{ github.server_url }}/${{ github.repository }}|${{ github.repository }}> branch `${{ env.BRANCH_NAME }}`"
